<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issue Tracker | Log in</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/style.css" />
    <!-- tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-[var(--bg-primary)] max-w-[1240px] mx-auto">
    <main class="grid md:place-items-center md:py-10">
      <!-- login section  -->
      <section
        class="p-4 md:p-8 space-y-6 bg-white h-[100dvh] md:h-auto md:w-1/3"
      >
        <!-- login top -->
        <div class="text-center space-y-1">
          <img class="mx-auto mb-3" src="./assets/github-logo.png" alt="" />
          <h2 class="font-semibold text-[20px] md:text-[24px]">
            GitHub Issues Tracker
          </h2>
          <p class="text-[var(--secondary-color)] text-sm font-medium">
            Sign in to manage your issues
          </p>
        </div>
        <!-- form  -->
        <div>
          <form action="" class="form flex flex-col space-y-2">
            <label for="input-username">Username</label>
            <input
              class="text-sm"
              type="text"
              name=""
              id="input-username"
              placeholder="Enter Username"
              required
            />
            <p class="text-blue-600 text-sm">Default: admin</p>

            <label for="input-password">Password</label>
            <input
              class="text-sm"
              type="password"
              name=""
              id="input-password"
              placeholder="Enter Password"
              required
            />
            <p class="text-blue-600 text-sm">Default: admin123</p>
            <button
              id="login-btn"
              class="bg-blue-600 text-white w-full p-3 rounded mt-3 font-medium"
              type="button"
            >
              Sign In
            </button>
          </form>
        </div>
        <!-- divide line  -->
        <div class="flex items-center my-6 font-semibold">
          <div class="flex-grow border-t border-gray-300"></div>
          <span class="mx-4 text-gray-500 text-sm">OR</span>
          <div class="flex-grow border-t border-gray-300"></div>
        </div>
        <!-- demo credentials  -->
        <div class="text-center space-y-2 font-medium">
          <h3 class="text-[var(--secondary-color)]">Demo Credentials:</h3>
          <div class="bg-[var(--bg-primary)] py-6 rounded-md">
            <p>
              Username: <span class="text-[var(--secondary-color)]">admin</span>
            </p>
            <p>
              Password:
              <span class="text-[var(--secondary-color)]">admin123</span>
            </p>
          </div>
        </div>
      </section>
    </main>
    <script src="./scripts/1.login.js"></script>
  </body>
</html>
